# Secrets GitHub requis :
#   RAILWAY_TOKEN — Token de service Railway (Settings > Tokens dans le dashboard Railway)
#
# Ce workflow se déclenche uniquement sur push vers main ET si le job CI api passe.
# Il ne déploie que si des fichiers dans apps/api/** ou packages/** ont changé.

name: Deploy API (Railway)

on:
  push:
    branches: [main]
    paths:
      - apps/api/**
      - packages/**
      - pnpm-lock.yaml

concurrency:
  group: deploy-api-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci-api:
    name: CI check before deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @revanim/api prisma generate

      - name: Type check (api)
        run: pnpm turbo run type-check --filter=@revanim/api

      - name: Lint (api)
        run: pnpm turbo run lint --filter=@revanim/api

      - name: Build (api)
        run: pnpm turbo run build --filter=@revanim/api

  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: ci-api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        run: railway up --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
