# Secrets GitHub requis : aucun (CI uniquement)
# Variables d'environnement attendues : aucune

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api:
    name: CI — API
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check (api)
        run: pnpm turbo run type-check --filter=@revanim/api

      - name: Lint (api)
        run: pnpm turbo run lint --filter=@revanim/api

      - name: Build (api)
        run: pnpm turbo run build --filter=@revanim/api

  mobile:
    name: CI — Mobile
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check (mobile)
        run: pnpm turbo run type-check --filter=@revanim/mobile

      - name: Lint (mobile)
        run: pnpm turbo run lint --filter=@revanim/mobile

      - name: Build (mobile)
        run: pnpm turbo run build --filter=@revanim/mobile
